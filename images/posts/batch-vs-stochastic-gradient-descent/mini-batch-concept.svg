<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="monospace" font-size="12">
  <defs>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Mini-Batch Gradient Descent (batch size = 4)</text>

  <!-- Full dataset -->
  <rect x="20" y="60" width="140" height="180" rx="6" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2"/>
  <text x="90" y="85" text-anchor="middle" font-weight="bold" fill="#0369a1">Full Dataset</text>
  <text x="90" y="105" text-anchor="middle" fill="#666" font-size="11">m = 16 samples</text>

  <!-- Data points in full dataset -->
  <g fill="#0ea5e9" opacity="0.5">
    <circle cx="50" cy="130" r="5"/><circle cx="70" cy="130" r="5"/><circle cx="90" cy="130" r="5"/><circle cx="110" cy="130" r="5"/>
    <circle cx="130" cy="130" r="5"/>
    <circle cx="50" cy="155" r="5"/><circle cx="70" cy="155" r="5"/><circle cx="90" cy="155" r="5"/><circle cx="110" cy="155" r="5"/>
    <circle cx="130" cy="155" r="5"/>
    <circle cx="50" cy="180" r="5"/><circle cx="70" cy="180" r="5"/><circle cx="90" cy="180" r="5"/><circle cx="110" cy="180" r="5"/>
    <circle cx="130" cy="180" r="5"/>
    <circle cx="50" cy="205" r="5"/><circle cx="70" cy="205" r="5"/><circle cx="90" cy="205" r="5"/><circle cx="110" cy="205" r="5"/>
  </g>

  <!-- Arrow from dataset to batches -->
  <line x1="160" y1="150" x2="195" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="178" y="140" text-anchor="middle" fill="#666" font-size="10">split</text>

  <!-- Mini-batches -->
  <!-- Batch 1 -->
  <rect x="195" y="60" width="90" height="70" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="240" y="80" text-anchor="middle" font-weight="bold" fill="#6d28d9" font-size="10">Batch 1</text>
  <g fill="#8b5cf6" opacity="0.6">
    <circle cx="215" cy="100" r="4"/><circle cx="230" cy="100" r="4"/><circle cx="245" cy="100" r="4"/><circle cx="260" cy="100" r="4"/>
  </g>

  <!-- Batch 2 -->
  <rect x="195" y="140" width="90" height="70" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="240" y="160" text-anchor="middle" font-weight="bold" fill="#6d28d9" font-size="10">Batch 2</text>
  <g fill="#8b5cf6" opacity="0.6">
    <circle cx="215" cy="180" r="4"/><circle cx="230" cy="180" r="4"/><circle cx="245" cy="180" r="4"/><circle cx="260" cy="180" r="4"/>
  </g>

  <!-- Batch 3 -->
  <rect x="195" y="220" width="90" height="70" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="240" y="240" text-anchor="middle" font-weight="bold" fill="#6d28d9" font-size="10">Batch 3</text>
  <g fill="#8b5cf6" opacity="0.6">
    <circle cx="215" cy="260" r="4"/><circle cx="230" cy="260" r="4"/><circle cx="245" cy="260" r="4"/><circle cx="260" cy="260" r="4"/>
  </g>

  <!-- Batch 4 -->
  <rect x="295" y="60" width="90" height="70" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="340" y="80" text-anchor="middle" font-weight="bold" fill="#6d28d9" font-size="10">Batch 4</text>
  <g fill="#8b5cf6" opacity="0.6">
    <circle cx="315" cy="100" r="4"/><circle cx="330" cy="100" r="4"/><circle cx="345" cy="100" r="4"/><circle cx="360" cy="100" r="4"/>
  </g>

  <!-- Arrows from batches to update -->
  <line x1="285" y1="95" x2="410" y2="95" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <line x1="285" y1="175" x2="410" y2="175" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <line x1="285" y1="255" x2="410" y2="255" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <line x1="385" y1="95" x2="410" y2="95" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Update steps -->
  <rect x="410" y="50" width="120" height="60" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="470" y="72" text-anchor="middle" font-weight="bold" fill="#b91c1c" font-size="11">Update 1</text>
  <text x="470" y="92" text-anchor="middle" fill="#333" font-size="10">θ ← θ - η∇C₁</text>

  <rect x="410" y="130" width="120" height="60" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="470" y="152" text-anchor="middle" font-weight="bold" fill="#b91c1c" font-size="11">Update 2</text>
  <text x="470" y="172" text-anchor="middle" fill="#333" font-size="10">θ ← θ - η∇C₂</text>

  <rect x="410" y="210" width="120" height="60" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="470" y="232" text-anchor="middle" font-weight="bold" fill="#b91c1c" font-size="11">Update 3</text>
  <text x="470" y="252" text-anchor="middle" fill="#333" font-size="10">θ ← θ - η∇C₃</text>

  <!-- Arrow to final -->
  <line x1="530" y1="160" x2="560" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- After one epoch -->
  <rect x="560" y="80" width="120" height="160" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="620" y="110" text-anchor="middle" font-weight="bold" fill="#15803d">After 1 Epoch</text>
  <text x="620" y="135" text-anchor="middle" fill="#333" font-size="10">4 updates</text>
  <text x="620" y="155" text-anchor="middle" fill="#333" font-size="10">all 16 samples</text>
  <text x="620" y="175" text-anchor="middle" fill="#333" font-size="10">used once</text>
  <text x="620" y="210" text-anchor="middle" fill="#666" font-size="10">repeat for</text>
  <text x="620" y="225" text-anchor="middle" fill="#666" font-size="10">next epoch</text>
</svg>
