<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" width="900" height="360" font-family="'JetBrains Mono',monospace" font-size="12">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#111820"/>
    </linearGradient>
  </defs>

  <rect width="900" height="360" fill="url(#bg)" rx="10"/>

  <text x="450" y="26" fill="#8b949e" text-anchor="middle" font-size="13" font-weight="bold">Packing + Block-Diagonal Causal Mask</text>
