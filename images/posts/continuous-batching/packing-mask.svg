  <!-- ═══ LEFT: Packed sequence ═══ -->
  <text x="170" y="70" fill="#6e7681" text-anchor="middle" font-size="11" font-weight="bold">packed input X ∈ ℝ^(6×d)</text>

  <!-- tokens as colored boxes -->
  <!-- A: teal -->
  <rect x="50"  y="80" width="70" height="40" rx="5" fill="#0a2a3a" stroke="#1ea8d8" stroke-width="2"/>
  <text x="85"  y="96"  fill="#1ea8d8" text-anchor="middle" font-size="10" font-weight="bold">t₁ᴬ</text>
  <text x="85"  y="110" fill="#4a8aaa" text-anchor="middle" font-size="9">pos 0</text>
