  <line x1="50" y1="120" x2="268" y2="120" stroke="#1ea8d8" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="120" x2="50" y2="128" stroke="#1ea8d8" stroke-width="1" opacity="0.5"/>
  <line x1="268" y1="120" x2="268" y2="128" stroke="#1ea8d8" stroke-width="1" opacity="0.5"/>

