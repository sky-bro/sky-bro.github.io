<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" width="920" height="400" font-family="'JetBrains Mono',monospace" font-size="12">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#111820"/>
    </linearGradient>
    <!-- request bar gradients -->
    <linearGradient id="prefill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6040c0"/>
      <stop offset="100%" stop-color="#8060e0"/>
    </linearGradient>
    <linearGradient id="decodeA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0e4d6a"/>
      <stop offset="100%" stop-color="#1470a0"/>
    </linearGradient>
    <linearGradient id="decodeB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a5c1a"/>
      <stop offset="100%" stop-color="#228a22"/>
    </linearGradient>
    <linearGradient id="decodeC" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a3010"/>
      <stop offset="100%" stop-color="#a04018"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="920" height="400" fill="url(#bg)" rx="10"/>

  <!-- divider -->
  <line x1="460" y1="16" x2="460" y2="390" stroke="#2a3a4a" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ═══ LEFT: STATIC BATCHING ═══ -->
  <text x="230" y="32" fill="#8b949e" text-anchor="middle" font-size="13" font-weight="bold">Static Batching</text>

  <!-- time axis -->
  <line x1="110" y1="328" x2="440" y2="328" stroke="#2a3a4a" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="442" y="332" fill="#4a5a6a" font-size="10">time</text>

  <!-- scale: 1 unit = 18px, each decode step = 1 unit, prefill = 2 -->
  <!-- Req A: prefill(2)+decode×5 = tokens 2–7 →  ends at 110+9×18=272 -->
  <text x="55"  y="86" fill="#1ea8d8" font-size="11">Req A</text>
  <rect x="110" y="72"  width="36"  height="26" rx="3" fill="url(#prefill)" stroke="#8060e0" stroke-width="1"/>
  <text x="128" y="89"  fill="#c0a0ff" text-anchor="middle" font-size="9">pre</text>
  <rect x="146" y="72"  width="126" height="26" rx="3" fill="url(#decodeA)" stroke="#1ea8d8" stroke-width="1"/>
  <text x="209" y="89"  fill="#60c0ff" text-anchor="middle" font-size="10">decode ×7</text>
  <!-- done mark -->
  <line x1="272" y1="68" x2="272" y2="100" stroke="#1ea8d8" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="272" y="64" fill="#1ea8d8" text-anchor="middle" font-size="9">done</text>

  <!-- Req B: prefill(2)+decode×9 -->
  <text x="55" y="130" fill="#2ea82e" font-size="11">Req B</text>
  <rect x="110" y="116" width="36"  height="26" rx="3" fill="url(#prefill)" stroke="#8060e0" stroke-width="1"/>
  <text x="128" y="133" fill="#c0a0ff" text-anchor="middle" font-size="9">pre</text>
  <rect x="146" y="116" width="162" height="26" rx="3" fill="url(#decodeB)" stroke="#2ea82e" stroke-width="1"/>
  <text x="227" y="133" fill="#60e060" text-anchor="middle" font-size="10">decode ×9</text>
  <line x1="308" y1="112" x2="308" y2="144" stroke="#2ea82e" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="308" y="108" fill="#2ea82e" text-anchor="middle" font-size="9">done</text>

  <!-- Req C: prefill(2)+decode×12 — the longest -->
  <text x="55" y="174" fill="#e08040" font-size="11">Req C</text>
  <rect x="110" y="160" width="36"  height="26" rx="3" fill="url(#prefill)" stroke="#8060e0" stroke-width="1"/>
  <text x="128" y="177" fill="#c0a0ff" text-anchor="middle" font-size="9">pre</text>
  <rect x="146" y="160" width="216" height="26" rx="3" fill="url(#decodeC)" stroke="#e08040" stroke-width="1"/>
  <text x="254" y="177" fill="#ffa060" text-anchor="middle" font-size="10">decode ×12</text>
  <line x1="362" y1="156" x2="362" y2="188" stroke="#e08040" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="362" y="152" fill="#e08040" text-anchor="middle" font-size="9">done</text>

  <!-- Batch bracket -->
  <rect x="110" y="196" width="252" height="22" rx="4" fill="#1a1008" stroke="#4a3010" stroke-width="1.2"/>
  <text x="236" y="211" fill="#8b6030" text-anchor="middle" font-size="10">batch must wait for Req C (longest)</text>

  <!-- IDLE markers for A and B after they finish -->
  <rect x="272" y="72"  width="90"  height="26" rx="3" fill="#1a1a1a" stroke="#3a3a3a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="317" y="89"  fill="#404040" text-anchor="middle" font-size="10">idle ⏳</text>
  <rect x="308" y="116" width="54"  height="26" rx="3" fill="#1a1a1a" stroke="#3a3a3a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="335" y="133" fill="#404040" text-anchor="middle" font-size="10">idle</text>

  <!-- next batch waiting -->
  <rect x="372" y="104" width="68" height="88" rx="5" fill="#080808" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="406" y="143" fill="#3a3a3a" text-anchor="middle" font-size="10">next</text>
  <text x="406" y="158" fill="#3a3a3a" text-anchor="middle" font-size="10">batch</text>
  <text x="406" y="173" fill="#3a3a3a" text-anchor="middle" font-size="10">waits</text>

  <!-- GPU utilization -->
  <rect x="110" y="240" width="252" height="18" rx="3" fill="#100808" stroke="#5a1a1a" stroke-width="1"/>
  <rect x="110" y="240" width="88"  height="18" rx="3" fill="#5a2020"/>
  <text x="236" y="253" fill="#e05050" text-anchor="middle" font-size="10">~35% GPU utilized</text>

  <!-- ═══ RIGHT: CONTINUOUS BATCHING ═══ -->
  <text x="690" y="32" fill="#8b949e" text-anchor="middle" font-size="13" font-weight="bold">Continuous Batching</text>

  <!-- time axis -->
  <line x1="480" y1="328" x2="900" y2="328" stroke="#2a3a4a" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="902" y="332" fill="#4a5a6a" font-size="10">time</text>

  <!-- iter ticks -->
  <line x1="480" y1="324" x2="480" y2="332" stroke="#3a5a4a" stroke-width="1.2"/>
  <line x1="506" y1="324" x2="506" y2="332" stroke="#3a5a4a" stroke-width="1.2"/>
  <line x1="532" y1="324" x2="532" y2="332" stroke="#3a5a4a" stroke-width="1.2"/>
  <line x1="558" y1="324" x2="558" y2="332" stroke="#3a5a4a" stroke-width="1.2"/>
  <line x1="584" y1="324" x2="584" y2="332" stroke="#3a5a4a" stroke-width="1.2"/>
  <line x1="610" y1="324" x2="610" y2="332" stroke="#3a5a4a" stroke-width="1.2"/>
  <line x1="636" y1="324" x2="636" y2="332" stroke="#3a5a4a" stroke-width="1.2"/>
  <line x1="662" y1="324" x2="662" y2="332" stroke="#3a5a4a" stroke-width="1.2"/>
  <line x1="688" y1="324" x2="688" y2="332" stroke="#3a5a4a" stroke-width="1.2"/>
  <line x1="714" y1="324" x2="714" y2="332" stroke="#3a5a4a" stroke-width="1.2"/>
  <line x1="740" y1="324" x2="740" y2="332" stroke="#3a5a4a" stroke-width="1.2"/>
  <line x1="766" y1="324" x2="766" y2="332" stroke="#3a5a4a" stroke-width="1.2"/>
  <line x1="792" y1="324" x2="792" y2="332" stroke="#3a5a4a" stroke-width="1.2"/>
  <line x1="818" y1="324" x2="818" y2="332" stroke="#3a5a4a" stroke-width="1.2"/>
  <text x="690" y="346" fill="#3a5a4a" text-anchor="middle" font-size="9">← each tick = one iteration →</text>

  <!-- Req A: prefill [480–506] + decode [506–584] -->
  <text x="470" y="86" fill="#1ea8d8" text-anchor="end" font-size="11">Req A</text>
  <rect x="480" y="72"  width="26"  height="26" rx="3" fill="url(#prefill)" stroke="#8060e0" stroke-width="1"/>
  <rect x="506" y="72"  width="78"  height="26" rx="3" fill="url(#decodeA)" stroke="#1ea8d8" stroke-width="1"/>
  <text x="545" y="89" fill="#60c0ff" text-anchor="middle" font-size="10">decode</text>
  <line x1="584" y1="68" x2="584" y2="100" stroke="#1ea8d8" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="584" y="64" fill="#1ea8d8" text-anchor="middle" font-size="9">done</text>

  <!-- Req B: prefill [480–506] + decode [506–636] -->
  <text x="470" y="130" fill="#2ea82e" text-anchor="end" font-size="11">Req B</text>
  <rect x="480" y="116" width="26"  height="26" rx="3" fill="url(#prefill)" stroke="#8060e0" stroke-width="1"/>
  <rect x="506" y="116" width="130" height="26" rx="3" fill="url(#decodeB)" stroke="#2ea82e" stroke-width="1"/>
  <text x="571" y="133" fill="#60e060" text-anchor="middle" font-size="10">decode</text>
  <line x1="636" y1="112" x2="636" y2="144" stroke="#2ea82e" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="636" y="108" fill="#2ea82e" text-anchor="middle" font-size="9">done</text>

  <!-- Req C: prefill [584–610] + decode [610–792] — inserted when A done -->
  <text x="470" y="174" fill="#e08040" text-anchor="end" font-size="11">Req C</text>
  <rect x="584" y="160" width="26"  height="26" rx="3" fill="url(#prefill)" stroke="#8060e0" stroke-width="1"/>
  <rect x="610" y="160" width="182" height="26" rx="3" fill="url(#decodeC)" stroke="#e08040" stroke-width="1"/>
  <text x="701" y="177" fill="#ffa060" text-anchor="middle" font-size="10">decode</text>
  <line x1="792" y1="156" x2="792" y2="188" stroke="#e08040" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="792" y="152" fill="#e08040" text-anchor="middle" font-size="9">done</text>
  <!-- "inserted when A done" label -->
  <text x="584" y="155" fill="#30a060" font-size="9" text-anchor="middle">↑ inserted</text>

  <!-- Req D: prefill [636–662] + decode [662–766] — inserted when B done -->
  <text x="470" y="218" fill="#a060e0" text-anchor="end" font-size="11">Req D</text>
  <rect x="636" y="204" width="26"  height="26" rx="3" fill="url(#prefill)" stroke="#8060e0" stroke-width="1"/>
  <rect x="662" y="204" width="104" height="26" rx="3" fill="#3a1a5a" stroke="#8040c0" stroke-width="1"/>
  <text x="714" y="221" fill="#c080f0" text-anchor="middle" font-size="10">decode</text>
  <line x1="766" y1="200" x2="766" y2="232" stroke="#a060e0" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="766" y="196" fill="#a060e0" text-anchor="middle" font-size="9">done</text>
  <text x="636" y="199" fill="#30a060" font-size="9" text-anchor="middle">↑ inserted</text>

  <!-- GPU utilization -->
  <rect x="480" y="240" width="364" height="18" rx="3" fill="#0a1810" stroke="#2a5a2a" stroke-width="1"/>
  <rect x="480" y="240" width="350" height="18" rx="3" fill="#205a20"/>
  <text x="662" y="253" fill="#60e060" text-anchor="middle" font-size="10">~96% GPU utilized</text>
</svg>
