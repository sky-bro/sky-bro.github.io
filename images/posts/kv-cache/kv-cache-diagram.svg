<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="monospace" font-size="14">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <!-- title -->
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">KV Cache: With vs Without</text>

  <!-- ====== WITHOUT CACHE (top half) ====== -->
  <text x="200" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">Without KV Cache — Redundant Recomputation</text>

  <!-- step 1 -->
  <text x="30" y="90" font-size="12" font-weight="bold">Step 1:</text>
  <rect x="95" y="78" width="60" height="24" rx="3" fill="#e74c3c" opacity="0.3"/>
  <text x="125" y="94" text-anchor="middle" font-size="11">k₁, v₁</text>
  <text x="170" y="94" font-size="11" fill="#666">compute</text>

  <!-- step 2 -->
  <text x="30" y="125" font-size="12" font-weight="bold">Step 2:</text>
  <rect x="95" y="113" width="60" height="24" rx="3" fill="#e74c3c" opacity="0.7"/>
  <text x="125" y="129" text-anchor="middle" font-size="11">k₁, v₁</text>
  <text x="170" y="129" font-size="11" fill="#c0392b">recompute!</text>
  <rect x="260" y="113" width="60" height="24" rx="3" fill="#e74c3c" opacity="0.3"/>
  <text x="290" y="129" text-anchor="middle" font-size="11">k₂, v₂</text>
  <text x="335" y="129" font-size="11" fill="#666">compute</text>

  <!-- step 3 -->
  <text x="30" y="160" font-size="12" font-weight="bold">Step 3:</text>
  <rect x="95" y="148" width="60" height="24" rx="3" fill="#e74c3c" opacity="0.7"/>
  <text x="125" y="164" text-anchor="middle" font-size="11">k₁, v₁</text>
  <text x="170" y="164" font-size="11" fill="#c0392b">recompute!</text>
  <rect x="260" y="148" width="60" height="24" rx="3" fill="#e74c3c" opacity="0.7"/>
  <text x="290" y="164" text-anchor="middle" font-size="11">k₂, v₂</text>
  <text x="335" y="164" font-size="11" fill="#c0392b">recompute!</text>
  <rect x="425" y="148" width="60" height="24" rx="3" fill="#e74c3c" opacity="0.3"/>
  <text x="455" y="164" text-anchor="middle" font-size="11">k₃, v₃</text>
  <text x="500" y="164" font-size="11" fill="#666">compute</text>

  <!-- step n -->
  <text x="30" y="205" font-size="12" font-weight="bold">Step n:</text>
  <rect x="95" y="193" width="55" height="24" rx="3" fill="#e74c3c" opacity="0.7"/>
  <text x="122" y="209" text-anchor="middle" font-size="11">k₁…kₙ₋₁</text>
  <text x="170" y="209" font-size="11" fill="#c0392b">all recompute!</text>
  <rect x="310" y="193" width="60" height="24" rx="3" fill="#e74c3c" opacity="0.3"/>
  <text x="340" y="209" text-anchor="middle" font-size="11">kₙ, vₙ</text>
  <text x="385" y="209" font-size="11" fill="#666">compute</text>

  <!-- total work -->
  <text x="200" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">Total FLOPs: O(n²) — each token recomputed O(n) times</text>

  <!-- ====== DIVIDER ====== -->
  <line x1="50" y1="270" x2="750" y2="270" stroke="#ccc" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- ====== WITH CACHE (bottom half) ====== -->
  <text x="200" y="300" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">With KV Cache — Only Compute Once</text>

  <!-- step 1 -->
  <text x="30" y="330" font-size="12" font-weight="bold">Step 1:</text>
  <rect x="95" y="318" width="60" height="24" rx="3" fill="#27ae60" opacity="0.3"/>
  <text x="125" y="334" text-anchor="middle" font-size="11">k₁, v₁</text>
  <text x="170" y="334" font-size="11" fill="#666">compute → cache</text>

  <!-- step 2 -->
  <text x="30" y="365" font-size="12" font-weight="bold">Step 2:</text>
  <rect x="95" y="353" width="60" height="24" rx="3" fill="#3498db" opacity="0.3"/>
  <text x="125" y="369" text-anchor="middle" font-size="11">k₁, v₁</text>
  <text x="170" y="369" font-size="11" fill="#2980b9">from cache</text>
  <rect x="260" y="353" width="60" height="24" rx="3" fill="#27ae60" opacity="0.3"/>
  <text x="290" y="369" text-anchor="middle" font-size="11">k₂, v₂</text>
  <text x="335" y="369" font-size="11" fill="#666">compute → cache</text>

  <!-- step 3 -->
  <text x="30" y="400" font-size="12" font-weight="bold">Step 3:</text>
  <rect x="95" y="388" width="60" height="24" rx="3" fill="#3498db" opacity="0.3"/>
  <text x="125" y="404" text-anchor="middle" font-size="11">k₁, v₁</text>
  <text x="170" y="404" font-size="11" fill="#2980b9">from cache</text>
  <rect x="260" y="388" width="60" height="24" rx="3" fill="#3498db" opacity="0.3"/>
  <text x="290" y="404" text-anchor="middle" font-size="11">k₂, v₂</text>
  <text x="335" y="404" font-size="11" fill="#2980b9">from cache</text>
  <rect x="425" y="388" width="60" height="24" rx="3" fill="#27ae60" opacity="0.3"/>
  <text x="455" y="404" text-anchor="middle" font-size="11">k₃, v₃</text>
  <text x="500" y="404" font-size="11" fill="#666">compute → cache</text>

  <!-- step n -->
  <text x="30" y="445" font-size="12" font-weight="bold">Step n:</text>
  <rect x="95" y="433" width="150" height="24" rx="3" fill="#3498db" opacity="0.3"/>
  <text x="170" y="449" text-anchor="middle" font-size="11">k₁…kₙ₋₁, v₁…vₙ₋₁</text>
  <text x="265" y="449" font-size="11" fill="#2980b9">from cache</text>
  <rect x="425" y="433" width="60" height="24" rx="3" fill="#27ae60" opacity="0.3"/>
  <text x="455" y="449" text-anchor="middle" font-size="11">kₙ, vₙ</text>
  <text x="500" y="449" font-size="11" fill="#666">compute → cache</text>

  <!-- total work -->
  <text x="200" y="490" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">Total FLOPs: O(n) — each token computed exactly once</text>

  <!-- legend -->
  <rect x="580" y="340" width="16" height="16" rx="3" fill="#27ae60" opacity="0.3"/>
  <text x="605" y="353" font-size="11" fill="#333">compute (new token)</text>
  <rect x="580" y="365" width="16" height="16" rx="3" fill="#3498db" opacity="0.3"/>
  <text x="605" y="378" font-size="11" fill="#333">read from cache</text>
  <rect x="580" y="390" width="16" height="16" rx="3" fill="#e74c3c" opacity="0.7"/>
  <text x="605" y="403" font-size="11" fill="#333">redundant recompute</text>
</svg>
