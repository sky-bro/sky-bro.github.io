<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0d1a2e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- grid of KV blocks — 5x4 layout, centered -->
  <!-- row 0 -->
  <rect x="64"  y="100" width="68" height="68" rx="8" fill="#0e3a52" stroke="#1a7a9e" stroke-width="2"/>
  <rect x="148" y="100" width="68" height="68" rx="8" fill="#0e4d6a" stroke="#1ea8d8" stroke-width="2.5"/>
  <rect x="232" y="100" width="68" height="68" rx="8" fill="#0e4d6a" stroke="#1ea8d8" stroke-width="2.5"/>
  <rect x="316" y="100" width="68" height="68" rx="8" fill="#0e3a52" stroke="#1a7a9e" stroke-width="2"/>
  <rect x="400" y="100" width="68" height="68" rx="8" fill="#081c29" stroke="#0e4d6a" stroke-width="1.5"/>

  <!-- row 1 -->
  <rect x="64"  y="184" width="68" height="68" rx="8" fill="#0e4d6a" stroke="#1ea8d8" stroke-width="2.5"/>
  <rect x="148" y="184" width="68" height="68" rx="8" fill="#116080" stroke="#24c4f5" stroke-width="3" filter="url(#glow)"/>
  <rect x="232" y="184" width="68" height="68" rx="8" fill="#116080" stroke="#24c4f5" stroke-width="3" filter="url(#glow)"/>
  <rect x="316" y="184" width="68" height="68" rx="8" fill="#0e4d6a" stroke="#1ea8d8" stroke-width="2.5"/>
  <rect x="400" y="184" width="68" height="68" rx="8" fill="#0e3a52" stroke="#1a7a9e" stroke-width="2"/>

  <!-- row 2 -->
  <rect x="64"  y="268" width="68" height="68" rx="8" fill="#081c29" stroke="#0e4d6a" stroke-width="1.5"/>
  <rect x="148" y="268" width="68" height="68" rx="8" fill="#0e4d6a" stroke="#1ea8d8" stroke-width="2.5"/>
  <rect x="232" y="268" width="68" height="68" rx="8" fill="#116080" stroke="#24c4f5" stroke-width="3" filter="url(#glow)"/>
  <rect x="316" y="268" width="68" height="68" rx="8" fill="#0e3a52" stroke="#1a7a9e" stroke-width="2"/>
  <rect x="400" y="268" width="68" height="68" rx="8" fill="#0e4d6a" stroke="#1ea8d8" stroke-width="2.5"/>

  <!-- row 3 -->
  <rect x="64"  y="352" width="68" height="68" rx="8" fill="#0e3a52" stroke="#1a7a9e" stroke-width="2"/>
  <rect x="148" y="352" width="68" height="68" rx="8" fill="#0e3a52" stroke="#1a7a9e" stroke-width="2"/>
  <rect x="232" y="352" width="68" height="68" rx="8" fill="#0e4d6a" stroke="#1ea8d8" stroke-width="2.5"/>
  <rect x="316" y="352" width="68" height="68" rx="8" fill="#116080" stroke="#24c4f5" stroke-width="3" filter="url(#glow)"/>
  <rect x="400" y="352" width="68" height="68" rx="8" fill="#081c29" stroke="#0e4d6a" stroke-width="1.5"/>

  <!-- glowing shared-block connection lines -->
  <!-- connect (1,1) → (1,2) horizontal -->
  <line x1="216" y1="218" x2="232" y2="218" stroke="#24c4f5" stroke-width="3" filter="url(#glow2)" stroke-linecap="round"/>
  <!-- connect (2,2) → (3,3) diagonal -->
  <line x1="266" y1="336" x2="350" y2="352" stroke="#24c4f5" stroke-width="3" filter="url(#glow2)" stroke-linecap="round"/>
  <!-- connect (0,1) → (1,1) vertical -->
  <line x1="182" y1="168" x2="182" y2="184" stroke="#24c4f5" stroke-width="3" filter="url(#glow2)" stroke-linecap="round"/>

  <!-- dot indicators on shared blocks -->
  <circle cx="182" cy="218" r="6" fill="#24c4f5" filter="url(#glow2)"/>
  <circle cx="266" cy="218" r="6" fill="#24c4f5" filter="url(#glow2)"/>
  <circle cx="266" cy="302" r="6" fill="#24c4f5" filter="url(#glow2)"/>
  <circle cx="350" cy="386" r="6" fill="#24c4f5" filter="url(#glow2)"/>
</svg>
