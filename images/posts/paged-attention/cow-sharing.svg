<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 370" width="880" height="370" font-family="'JetBrains Mono',monospace" font-size="13">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#111820"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b949e"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e06060"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#30c060"/>
    </marker>
  </defs>

  <rect width="880" height="370" fill="url(#bg)" rx="10"/>

  <text x="440" y="28" fill="#8b949e" text-anchor="middle" font-size="14" font-weight="bold">Copy-on-Write: Parallel Sampling from the Same Prompt</text>

  <!-- ═══ SHARED PROMPT BLOCKS (top, centered) ═══ -->
  <text x="440" y="58" fill="#6e7681" text-anchor="middle" font-size="11">shared prompt KV cache  (ref_count = 3)</text>

  <rect x="270" y="68" width="110" height="48" rx="7" fill="#0e3050" stroke="#3080c0" stroke-width="2.5" filter="url(#glow)"/>
  <text x="325" y="87" fill="#3080c0" text-anchor="middle" font-size="11" font-weight="bold">phys block 2</text>
  <text x="325" y="103" fill="#8b949e" text-anchor="middle" font-size="11">prompt [0–15]</text>

  <rect x="500" y="68" width="110" height="48" rx="7" fill="#0e3050" stroke="#3080c0" stroke-width="2.5" filter="url(#glow)"/>
  <text x="555" y="87" fill="#3080c0" text-anchor="middle" font-size="11" font-weight="bold">phys block 6</text>
  <text x="555" y="103" fill="#8b949e" text-anchor="middle" font-size="11">prompt [16–31]</text>

  <!-- ref count badge -->
  <circle cx="376" cy="68" r="14" fill="#1a3060" stroke="#3080c0" stroke-width="1.5"/>
  <text x="376" y="73" fill="#60a0ff" text-anchor="middle" font-size="10" font-weight="bold">×3</text>
  <circle cx="606" cy="68" r="14" fill="#1a3060" stroke="#3080c0" stroke-width="1.5"/>
  <text x="606" y="73" fill="#60a0ff" text-anchor="middle" font-size="10" font-weight="bold">×3</text>

  <!-- ═══ THREE CANDIDATES (below) ═══ -->
  <!-- Candidate 1 -->
  <rect x="50" y="175" width="130" height="44" rx="7" fill="#101828" stroke="#2a4060" stroke-width="1.5"/>
  <text x="115" y="194" fill="#4a8aaa" text-anchor="middle" font-size="11" font-weight="bold">Candidate 1</text>
  <text x="115" y="210" fill="#6e7681" text-anchor="middle" font-size="10">decode block 8</text>
  <text x="115" y="222" fill="#6e7681" text-anchor="middle" font-size="9">(ref_count = 1)</text>

  <!-- Candidate 2 -->
  <rect x="375" y="175" width="130" height="44" rx="7" fill="#101828" stroke="#2a4060" stroke-width="1.5"/>
  <text x="440" y="194" fill="#4a8aaa" text-anchor="middle" font-size="11" font-weight="bold">Candidate 2</text>
  <text x="440" y="210" fill="#6e7681" text-anchor="middle" font-size="10">decode block 11</text>
  <text x="440" y="222" fill="#6e7681" text-anchor="middle" font-size="9">(ref_count = 1)</text>

  <!-- Candidate 3 -->
  <rect x="700" y="175" width="130" height="44" rx="7" fill="#101828" stroke="#2a4060" stroke-width="1.5"/>
  <text x="765" y="194" fill="#4a8aaa" text-anchor="middle" font-size="11" font-weight="bold">Candidate 3</text>
  <text x="765" y="210" fill="#6e7681" text-anchor="middle" font-size="10">decode block 14</text>
  <text x="765" y="222" fill="#6e7681" text-anchor="middle" font-size="9">(ref_count = 1)</text>

  <!-- lines from shared blocks → candidates -->
  <path d="M 325 116 C 325 148, 115 148, 115 175" stroke="#3080c0" stroke-width="1.5" fill="none" marker-end="url(#arr)" opacity="0.7"/>
  <path d="M 555 116 C 555 148, 115 148, 115 175" stroke="#3080c0" stroke-width="1.5" fill="none" marker-end="url(#arr)" opacity="0.7"/>

  <path d="M 325 116 C 325 148, 440 148, 440 175" stroke="#3080c0" stroke-width="1.5" fill="none" marker-end="url(#arr)" opacity="0.7"/>
  <path d="M 555 116 C 555 148, 440 148, 440 175" stroke="#3080c0" stroke-width="1.5" fill="none" marker-end="url(#arr)" opacity="0.7"/>

  <path d="M 325 116 C 325 148, 765 148, 765 175" stroke="#3080c0" stroke-width="1.5" fill="none" marker-end="url(#arr)" opacity="0.7"/>
  <path d="M 555 116 C 555 148, 765 148, 765 175" stroke="#3080c0" stroke-width="1.5" fill="none" marker-end="url(#arr)" opacity="0.7"/>

  <!-- ═══ CoW trigger for Candidate 2 ═══ -->
  <text x="440" y="250" fill="#e06060" text-anchor="middle" font-size="11" font-weight="bold">⚡ Candidate 2 writes to shared block 6 → CoW triggered</text>

  <!-- CoW steps -->
  <!-- Step 1: point to old shared -->
  <rect x="315" y="268" width="108" height="38" rx="5" fill="#2a0808" stroke="#803030" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="369" y="284" fill="#c05050" text-anchor="middle" font-size="10">old: phys block 6</text>
  <text x="369" y="298" fill="#c05050" text-anchor="middle" font-size="10">ref_count: 3 → 2</text>

  <!-- arrow -->
  <line x1="423" y1="287" x2="453" y2="287" stroke="#30c060" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Step 2: new block -->
  <rect x="457" y="268" width="108" height="38" rx="5" fill="#082a12" stroke="#30a050" stroke-width="1.8" filter="url(#glow)"/>
  <text x="511" y="284" fill="#30c060" text-anchor="middle" font-size="10">new: phys block 15</text>
  <text x="511" y="298" fill="#30c060" text-anchor="middle" font-size="10">copy + write ✓</text>

  <!-- Step labels -->
  <text x="369" y="320" fill="#8b949e" text-anchor="middle" font-size="10">① decrement ref on old block</text>
  <text x="511" y="320" fill="#8b949e" text-anchor="middle" font-size="10">② allocate new, memcpy, write</text>

  <!-- bottom note -->
  <rect x="50" y="340" width="780" height="24" rx="5" fill="#0a1a10" stroke="#1a3a20" stroke-width="1"/>
  <text x="440" y="357" fill="#4aaa6a" text-anchor="middle" font-size="11">candidates 1 &amp; 3 are unaffected — they still reference the original shared blocks</text>
</svg>
