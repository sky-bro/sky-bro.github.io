<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 380" font-family="monospace" font-size="13">
  <defs>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Backward Propagation</text>

  <!-- Row 1: Output layer (Layer L=3) -->
  <rect x="10" y="50" width="480" height="100" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="250" y="75" text-anchor="middle" font-weight="bold" fill="#b91c1c">Layer L = 3 (Output Layer)</text>
  <text x="250" y="100" text-anchor="middle" fill="#333">δ⁽ᴸ⁾ = (a⁽ᴸ⁾ − y) ⊙ σ'(z⁽ᴸ⁾)</text>
  <text x="250" y="125" text-anchor="middle" fill="#333">∂C/∂W⁽ᴸ⁾ = δ⁽ᴸ⁾(a⁽ᴸ⁻¹⁾)ᵀ</text>
  <text x="250" y="140" text-anchor="middle" fill="#333">∂C/∂b⁽ᴸ⁾ = δ⁽ᴸ⁾</text>

  <!-- Arrow down -->
  <line x1="250" y1="150" x2="250" y2="185" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="270" y="172" fill="#dc2626" font-size="11">δ⁽ˡ⁺¹⁾</text>

  <!-- Row 2: Hidden layer (Layer l=2) -->
  <rect x="10" y="185" width="480" height="100" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="250" y="210" text-anchor="middle" font-weight="bold" fill="#b91c1c">Layer l = 2 (Hidden Layer)</text>
  <text x="250" y="235" text-anchor="middle" fill="#333">δ⁽ˡ⁾ = (W⁽ˡ⁺¹⁾)ᵀ δ⁽ˡ⁺¹⁾ ⊙ σ'(z⁽ˡ⁾)</text>
  <text x="250" y="260" text-anchor="middle" fill="#333">∂C/∂W⁽ˡ⁾ = δ⁽ˡ⁾(a⁽ˡ⁻¹⁾)ᵀ</text>
  <text x="250" y="275" text-anchor="middle" fill="#333">∂C/∂b⁽ˡ⁾ = δ⁽ˡ⁾</text>

  <!-- Arrow down -->
  <line x1="250" y1="285" x2="250" y2="320" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="270" y="308" fill="#dc2626" font-size="11">stop</text>

  <!-- Input -->
  <rect x="10" y="320" width="480" height="45" rx="6" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2"/>
  <text x="250" y="348" text-anchor="middle" font-weight="bold" fill="#0369a1">Input: a⁽¹⁾ = x — backpropagation stops here</text>
</svg>
